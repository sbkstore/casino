<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stuntfly | iOS Style</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-black: #000000;
            --apple-dark: #1c1c1e;
            --apple-gray: #2c2c2e;
            --accent-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* OVERLAY DE LOGIN */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-black); z-index: 10000;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card {
            width: 100%; max-width: 380px; text-align: center;
            background: var(--apple-dark); padding: 40px 25px;
            border-radius: 30px; border: 1px solid var(--apple-gray);
        }
        .login-input {
            background: var(--bg-black) !important; border: 1px solid var(--apple-gray) !important;
            border-radius: 15px; color: white !important; padding: 15px; margin-bottom: 12px; text-align: center;
        }

        header {
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .balance-box {
            background: var(--apple-dark); padding: 5px 12px;
            border-radius: 12px; font-size: 0.9rem; border: 1px solid var(--apple-gray);
        }

        .content-section { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .game-card {
            background: var(--apple-dark); border-radius: 18px; overflow: hidden;
            border: 1px solid var(--apple-gray); transition: transform 0.2s;
            text-decoration: none; display: block;
        }
        .game-card:active { transform: scale(0.95); }
        .game-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .game-title { padding: 10px; font-size: 0.8rem; text-align: center; color: var(--text-secondary); font-weight: 500; }

        .tab-bar {
            position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(25px); display: flex; justify-content: space-around;
            padding: 10px 0 30px 0; border-top: 0.5px solid rgba(255,255,255,0.1); z-index: 2000;
        }
        .tab-item { color: var(--text-secondary); text-align: center; font-size: 0.65rem; flex: 1; cursor: pointer; }
        .tab-item i { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .tab-item.active { color: var(--accent-blue); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 class="fw-bolder mb-2" style="letter-spacing: -1.5px; font-size: 2.2rem;">STUNTFLY</h2>
            <p class="text-secondary mb-4 small">Ingresa con tu cuenta de Nexus Studio</p>
            <input type="text" id="userIn" class="form-control login-input" placeholder="Usuario">
            <input type="password" id="passIn" class="form-control login-input" placeholder="Contraseña">
            <button class="btn btn-primary w-100 py-3 mt-2 fw-bold" style="border-radius: 15px;" id="loginBtn" onclick="handleLogin()">ENTRAR</button>
            <p id="login-err" class="text-danger mt-3 small" style="display:none;"></p>
        </div>
    </div>

    <header>
        <div class="brand fw-bold">Stuntfly</div>
        <div class="balance-box">
            <span style="color: #34C759; margin-right: 5px;">$</span><span id="bal-header">0.00</span>
        </div>
    </header>

    <div id="games" class="content-section active">
        <h1>Explorar</h1>
        <div class="row g-3">
            <div class="col-6">
                <a href="dragontower.html" class="game-card">
                    <img src="juegos/dragon.jpg" alt="Dragon Tower">
                    <div class="game-title">DRAGON TOWER</div>
                </a>
            </div>
            <div class="col-6">
    <a href="blackjack.html" class="game-card">
        <img src="juegos/blackjack.jpg" alt="Blackjack">
        <div class="game-title">BLACKJACK</div>
    </a>
     </div>
         <div class="col-6">
    <a href="roulette.html" class="game-card">
        <img src="juegos/roulette.jpg" alt="Roulette">
        <div class="game-title">ROULETTE</div>
    </a>
     </div>
         <div class="col-6">
    <a href="mine.html" class="game-card">
        <img src="juegos/mine.jpg" alt="mine">
        <div class="game-title">MINAS</div>
    </a>
</div>
        </div>
    </div>

    <div id="wallet" class="content-section">
        <h1>Billetera</h1>
        <div class="p-4 text-center" style="background: var(--apple-dark); border-radius: 20px;">
            <p class="text-secondary mb-1">Balance Total</p>
            <h2 class="mb-4">$<span id="bal-wallet">0.00</span> ARS</h2>
        </div>
    </div>

    <div id="profile" class="content-section">
        <h1>Cuenta</h1>
        <div class="list-group list-group-flush" style="border-radius: 20px; overflow: hidden;">
            <div class="list-group-item bg-dark text-white border-secondary p-3"><i class="bi bi-person me-3"></i> <span id="user-display">...</span></div>
            <div class="list-group-item bg-dark text-white border-secondary p-3 text-danger" onclick="logoutApp()" style="cursor:pointer;">
                <i class="bi bi-box-arrow-right me-3"></i> Cerrar Sesión
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="showSection('games', this)"><i class="bi bi-grid-fill"></i>Juegos</div>
        <div class="tab-item" onclick="showSection('wallet', this)"><i class="bi bi-wallet2"></i>Cartera</div>
        <div class="tab-item" onclick="showSection('profile', this)"><i class="bi bi-person-circle"></i>Perfil</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD40SqIpz4EFvTlHlbs4Amm9H4I2NKqgDE",
            authDomain: "login-c4685.firebaseapp.com",
            projectId: "login-c4685",
            databaseURL: "https://login-c4685-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // RESET DE UI
        function resetUI() {
            document.getElementById('bal-header').innerText = "0.00";
            document.getElementById('bal-wallet').innerText = "0.00";
            document.getElementById('user-display').innerText = "...";
            localStorage.removeItem('stuntfly_session');
        }

        window.handleLogin = async () => {
            const u = document.getElementById('userIn').value.trim().toLowerCase();
            const p = document.getElementById('passIn').value.trim();
            const err = document.getElementById('login-err');
            if(!u || !p) return;

            try {
                // Antes de loguear, limpiamos cualquier rastro anterior
                resetUI();
                await signOut(auth); 
                
                const res = await signInWithEmailAndPassword(auth, `${u}@nexus.com`, p);
                
                // VALIDACIÓN CRUCIAL: Verificamos si el UID existe en la DB de usuarios
                const userDoc = await get(ref(db, `usuarios/${res.user.uid}`));
                if(!userDoc.exists()){
                    await signOut(auth);
                    throw new Error("Usuario no habilitado en Nexus.");
                }
                
                err.style.display = 'none';
            } catch (e) {
                err.innerText = "Acceso Denegado: Credenciales inválidas.";
                err.style.display = 'block';
            }
        };

        window.logoutApp = () => {
            resetUI();
            signOut(auth);
        };

        onAuthStateChanged(auth, (user) => {
            const overlay = document.getElementById('login-overlay');
            if (user) {
                // Doble check: si no tiene el dominio nexus.com, lo echamos
                if(!user.email.endsWith('@nexus.com')) return logoutApp();

                overlay.style.display = 'none';
                localStorage.setItem('stuntfly_session', JSON.stringify({ uid: user.uid }));
                document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                
                // Escucha de saldo exclusiva del UID actual
                onValue(ref(db, `usuarios/${user.uid}/balance`), (snap) => {
                    const b = snap.val() || 0;
                    document.getElementById('bal-header').innerText = parseFloat(b).toFixed(2);
                    document.getElementById('bal-wallet').innerText = parseFloat(b).toFixed(2);
                });
            } else {
                overlay.style.display = 'flex';
                resetUI();
            }
        });

        window.showSection = (id, el) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
        };
    </script>
</body>
</html>
