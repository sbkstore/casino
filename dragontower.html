<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stuntfly | Dragon Tower</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-black: #000000;
            --apple-dark: #1c1c1e;
            --apple-gray: #2c2c2e;
            --accent-blue: #0A84FF;
            --accent-green: #34C759;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.5px; }

        .balance-box {
            background: var(--apple-dark);
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid var(--apple-gray);
        }

        .game-content { padding: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tower-card {
            background: var(--apple-dark);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid var(--apple-gray);
            margin-bottom: 20px;
        }

        .tower-grid { display: flex; flex-direction: column-reverse; gap: 8px; }
        .row-game { display: grid; gap: 8px; padding: 5px; border-radius: 12px; transition: 0.3s; }
        .row-game.active-row { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); }
        .row-game.passed-row { opacity: 0.4; }

        .tile {
            height: 45px;
            background: var(--apple-gray);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            border: none;
            cursor: pointer;
            color: transparent;
        }

        .tile i { font-size: 1.1rem; }
        .tile.win { background: var(--accent-green); color: #000; }
        .tile.loss { background: #FF453A; color: #fff; }
        .tile.revealed-win { background: rgba(52, 199, 89, 0.1); color: var(--accent-green); border: 1px solid rgba(52, 199, 89, 0.3); }
        .tile.revealed-loss { background: rgba(255, 69, 58, 0.2); color: #FF453A; border: 1px solid #FF453A; }

        .bet-panel { background: var(--apple-dark); border-radius: 20px; padding: 20px; border: 1px solid var(--apple-gray); }
        .main-btn {
            width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 700; font-size: 1rem; margin-bottom: 15px; background: var(--accent-blue); color: white; text-transform: uppercase;
        }
        .btn-cashout { background: var(--accent-green); color: #000; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3); }

        .input-group-custom {
            background: var(--bg-black); border: 1px solid var(--apple-gray); border-radius: 15px; display: flex; margin-bottom: 15px; padding: 4px;
        }
        .input-group-custom input { background: transparent; border: none; color: white; padding: 10px; width: 100%; outline: none; font-weight: 600; }
        .btn-adj { background: var(--apple-gray); border: none; color: white; padding: 0 15px; border-radius: 10px; font-weight: 700; margin-left: 4px; }

        .tab-bar {
            position: fixed; bottom: 0; width: 100%; background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 10px 0 30px 0; border-top: 0.5px solid rgba(255,255,255,0.1); z-index: 2000;
        }
        .tab-item { color: var(--text-secondary); text-decoration: none; text-align: center; font-size: 0.65rem; flex: 1; cursor: pointer; }
        .tab-item i { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .tab-item.active { color: var(--accent-blue); }
    </style>
</head>
<body>

    <header>
        <div class="brand">Stuntfly</div>
        <div class="balance-box">
            <span style="color: #34C759; margin-right: 5px;">$</span><span id="bal-display">0.00</span>
        </div>
    </header>

    <div class="game-content">
        <h1 style="font-weight: 700; font-size: 1.8rem; margin-bottom: 20px;">Dragon Tower</h1>
        
        <div class="tower-card">
            <div class="tower-grid" id="board"></div>
        </div>

        <div class="bet-panel">
            <div id="action-area">
                <button class="main-btn" onclick="startGame()">APUESTA</button>
            </div>
            
            <div class="input-group-custom">
                <input type="number" id="bet-input" value="10.00">
                <button class="btn-adj" onclick="modify(0.5)">½</button>
                <button class="btn-adj" onclick="modify(2)">2x</button>
            </div>

            <select id="diff" class="form-select bg-transparent text-white border-secondary shadow-none" 
                    style="border-radius: 12px; font-size: 0.9rem;" onchange="initBoard()">
                <option value="easy">Fácil (1 Bomba)</option>
                <option value="medium">Medio (1 Bomba)</option>
                <option value="hard">Difícil (1 Bomba)</option>
            </select>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="irA('games')"><i class="bi bi-grid-fill"></i>Juegos</div>
        <div class="tab-item" onclick="irA('wallet')"><i class="bi bi-wallet2"></i>Cartera</div>
        <div class="tab-item" onclick="irA('profile')"><i class="bi bi-person-circle"></i>Perfil</div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD40SqIpz4EFvTlHlbs4Amm9H4I2NKqgDE",
            authDomain: "login-c4685.firebaseapp.com",
            projectId: "login-c4685",
            databaseURL: "https://login-c4685-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const session = JSON.parse(localStorage.getItem('stuntfly_session'));
        if(!session) window.location.href = 'index.html';

        let lastBalance = localStorage.getItem('stuntfly_last_bal') || "0.00";
        document.getElementById('bal-display').innerText = parseFloat(lastBalance).toFixed(2);

        let currentBalance = parseFloat(lastBalance);
        onValue(ref(db, `usuarios/${session.uid}/balance`), (snap) => {
            currentBalance = snap.val() || 0;
            localStorage.setItem('stuntfly_last_bal', currentBalance);
            document.getElementById('bal-display').innerText = currentBalance.toFixed(2);
        });

        let isPlaying = false;
        let currentLvl = 0;
        let currentBet = 0;
        let bombMatrix = []; 

        const config = {
            easy: { cols: 4, mult: 1.3 },
            medium: { cols: 3, mult: 1.45 },
            hard: { cols: 2, mult: 1.9 }
        };

        window.initBoard = function() {
            if(isPlaying) return;
            const ds = document.getElementById('diff');
            localStorage.setItem('stuntfly_tower_diff', ds.value);
            
            const board = document.getElementById('board');
            const d = config[ds.value];
            board.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const row = document.createElement('div');
                row.className = 'row-game';
                row.id = `row-${i}`;
                row.style.gridTemplateColumns = `repeat(${d.cols}, 1fr)`;
                for (let j = 0; j < d.cols; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.onclick = () => window.playTile(i, j);
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        window.startGame = async function() {
            const betVal = parseFloat(document.getElementById('bet-input').value);
            if(betVal > currentBalance || betVal <= 0) return alert("Saldo insuficiente");

            isPlaying = true;
            currentBet = betVal;
            currentLvl = 0;

            await update(ref(db, `usuarios/${session.uid}`), { balance: currentBalance - betVal });

            const d = config[document.getElementById('diff').value];
            bombMatrix = Array.from({length: 9}, () => Math.floor(Math.random() * d.cols));

            document.getElementById('diff').disabled = true;
            document.getElementById('bet-input').disabled = true;
            window.updateUI();
        }

        window.playTile = function(l, c) {
            if(!isPlaying || l !== currentLvl) return;
            const row = document.getElementById(`row-${l}`);
            const tiles = row.querySelectorAll('.tile');

            if(c !== bombMatrix[l]) { 
                tiles[c].classList.add('win');
                tiles[c].innerHTML = '<i class="bi bi-diamond-fill"></i>';
                currentLvl++;
                if(currentLvl === 9) window.cashout();
                else window.updateUI();
            } else { 
                // PERDISTE: Bloqueo inmediato de lógica y botón
                isPlaying = false;
                tiles[c].classList.add('loss');
                tiles[c].innerHTML = '<i class="bi bi-circle-fill"></i>';
                
                const btnArea = document.getElementById('action-area');
                btnArea.innerHTML = `<button class="main-btn" disabled style="background: #FF453A;">BOMBA ENCONTRADA</button>`;
                
                window.revealBoard();
                setTimeout(() => location.reload(), 2500);
            }
        }

        window.revealBoard = function() {
            for(let i=0; i<9; i++) {
                const rowTiles = document.getElementById(`row-${i}`).querySelectorAll('.tile');
                rowTiles.forEach((tile, index) => {
                    tile.onclick = null;
                    if(index === bombMatrix[i]) {
                        if(!tile.classList.contains('loss')) {
                            tile.classList.add('revealed-loss');
                            tile.innerHTML = '<i class="bi bi-circle-fill"></i>';
                        }
                    } else {
                        if(!tile.classList.contains('win')) {
                            tile.classList.add('revealed-win');
                            tile.innerHTML = '<i class="bi bi-diamond-fill"></i>';
                        }
                    }
                });
            }
        }

        window.cashout = async function() {
            if(!isPlaying || currentLvl === 0) return;
            const d = config[document.getElementById('diff').value];
            const totalRetorno = currentBet * Math.pow(d.mult, currentLvl);
            
            isPlaying = false; // Detener clics antes de procesar saldo
            await update(ref(db, `usuarios/${session.uid}`), { balance: currentBalance + totalRetorno });
            location.reload();
        }

        window.updateUI = function() {
            const d = config[document.getElementById('diff').value];
            const totalRetorno = currentBet * Math.pow(d.mult, currentLvl);

            for(let i=0; i<9; i++) {
                const r = document.getElementById(`row-${i}`);
                r.classList.remove('active-row', 'passed-row');
                if(i === currentLvl) r.classList.add('active-row');
                else if(i < currentLvl) r.classList.add('passed-row');
            }

            const btnArea = document.getElementById('action-area');
            if(isPlaying && currentLvl > 0) {
                btnArea.innerHTML = `<button class="main-btn btn-cashout" onclick="window.cashout()">RETIRAR $${totalRetorno.toFixed(2)}</button>`;
            } else if(isPlaying) {
                btnArea.innerHTML = `<button class="main-btn" disabled style="opacity:0.6">ELEGIR CASILLA</button>`;
            } else {
                btnArea.innerHTML = `<button class="main-btn" onclick="window.startGame()">APUESTA</button>`;
            }
        }

        window.modify = (f) => { if(!isPlaying) { let i = document.getElementById('bet-input'); i.value = (parseFloat(i.value) * f).toFixed(2); } };
        window.irA = (sec) => { window.location.href = `index.html?section=${sec}`; };

        window.onload = () => {
            const savedDiff = localStorage.getItem('stuntfly_tower_diff');
            if(savedDiff) document.getElementById('diff').value = savedDiff;
            window.initBoard();
        };
    </script>
</body>
</html>
